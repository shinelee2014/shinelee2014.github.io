<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShineLee's AI Lab | Protected</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle at top right, #1e293b, #0f172a); min-height: 100vh; color: #f8fafc; font-family: sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 1.5rem; border-radius: 1.5rem; }
        .glass:hover { transform: translateY(-3px); background: rgba(255, 255, 255, 0.08); border-color: rgba(255, 255, 255, 0.2); }
        #authOverlay { position: fixed; inset: 0; background: #0f172a; display: flex; align-items: center; justify-content: center; z-index: 100; transition: 0.5s ease-out; }
        .hidden-auth { transform: translateY(-100%); opacity: 0; pointer-events: none; }
    </style>
</head>
<body class="p-8">
    <div id="authOverlay">
        <div class="glass w-full max-w-sm text-center">
            <h2 class="text-2xl font-bold mb-6 italic">ShineLee's AI Lab</h2>
            <input type="password" id="passInput" placeholder="请输入密钥" class="w-full bg-slate-900 border border-slate-700 py-3 px-4 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 mb-4 text-center">
            <button onclick="checkPass()" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-bold transition">立即进入</button>
        </div>
    </div>

    <h1 class="text-4xl font-bold text-center mb-12">ShineLee's <span class="text-blue-400">AI Lab</span></h1>
    <div id="repos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

    <script>
        const USERNAME = 'shinelee2014';
        const CORRECT_PASS = 'sean';

        function checkPass() {
            if(document.getElementById('passInput').value === CORRECT_PASS) {
                document.getElementById('authOverlay').classList.add('hidden-auth');
                localStorage.setItem('lab_auth', 'true');
                fetchRepos();
            }
        }

        if(localStorage.getItem('lab_auth') === 'true') {
            document.getElementById('authOverlay').style.display = 'none';
            fetchRepos();
        }

        async function fetchRepos() {
            const res = await fetch('https://api.github.com/users/' + USERNAME + '/repos?sort=updated&per_page=100');
            const repos = await res.json();
            const grid = document.getElementById('repos');
            grid.innerHTML = '';
            
            // 宽泛过滤：除了主页仓库和私有标识，全都显示
            repos.filter(r => r.name !== USERNAME + '.github.io').forEach(repo => {
                const card = document.createElement('div');
                card.className = 'glass';
                card.innerHTML = '<h3 class=\"text-xl font-bold mb-2\">' + repo.name + '</h3><p class=\"text-sm text-slate-400 mb-6\">' + (repo.description || '项目暂无简介') + '</p><a target=\"_blank\" href=\"https://' + USERNAME + '.github.io/' + repo.name + '/\" class=\"block w-full text-center bg-blue-600/20 text-blue-400 py-2 rounded-xl hover:bg-blue-600/40 transition\">立即打开</a>';
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
