<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShineLee's AI Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle at top right, #1e293b, #0f172a); min-height: 100vh; color: #f8fafc; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 1.5rem; border-radius: 1.5rem; transition: 0.3s; }
        .glass:hover { transform: translateY(-3px); background: rgba(255, 255, 255, 0.08); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        .btn { display: block; width: 100%; text-align: center; background: #3b82f6; color: white; padding: 0.5rem; border-radius: 0.75rem; margin-top: 1rem; }
    </style>
</head>
<body class="p-8">
    <h1 class="text-4xl font-bold text-center mb-12">ShineLee's <span class="text-blue-400">AI Lab</span></h1>
    <div id="repos" class="grid">正在连接 GitHub...</div>
    <script>
        fetch('https://api.github.com/users/shinelee2014/repos?sort=updated&per_page=100')
        .then(res => res.json())
        .then(data => {
            const container = document.getElementById('repos');
            container.innerHTML = '';
            data.filter(r => !r.fork && r.name !== 'shinelee2014.github.io').forEach(repo => {
                const div = document.createElement('div');
                div.className = 'glass';
                div.innerHTML = '<h3>' + repo.name + '</h3><p class=\"text-sm text-slate-400\">' + (repo.description || '') + '</p><a class=\"btn\" href=\"https://shinelee2014.github.io/' + repo.name + '/\">打开工具</a>';
                container.appendChild(div);
            });
        });
    </script>
</body>
</html>
